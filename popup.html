<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h3>UTM Builder</h3>
  
  <div class="input-group">
    <label for="baseUrl">Destination URL</label>
    <input type="text" id="baseUrl" placeholder="https://example.com" required>
  </div>

  <div class="input-group">
    <label for="platform">Platform (utm_medium)</label>
    <select id="platform">
      <option value="linkedin">LinkedIn</option>
      <option value="twitter">Twitter</option>
      <option value="facebook">Facebook</option>
      <option value="instagram">Instagram</option>
    </select>
  </div>

  <div class="input-group">
    <label for="campaign">Campaign Name (utm_campaign)</label>
    <input type="text" id="campaign" placeholder="e.g., q3_webinar" required>
  </div>

  <div class="input-group">
    <label for="format">File Format (for utm_content)</label>
    <select id="format">
      <option value="image">Image</option>
      <option value="video">Video</option>
      <option value="carousel">Carousel</option>
      <option value="tweet">Tweet</option>
      <option value="thread">Thread</option>
      <option value="text">Text</option>
      <option value="reshare">Reshare</option>
    </select>
  </div>

  <div class="input-group">
    <label for="dateStr">Date (ddmmmm)</label>
    <input type="text" id="dateStr" required>
  </div>

  <button id="generateBtn">Generate & Copy URL</button>

  <div id="resultContainer" style="display: none;">
    <textarea id="finalUrl" readonly></textarea>
    <span id="copyStatus">Copied to clipboard!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
