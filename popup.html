<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <style>
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    h3 { margin: 0; }
    #openSettings { cursor: pointer; color: #555; text-decoration: none; font-size: 14px; }
    #openSettings:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header-bar">
    <h3>UTM Builder</h3>
    <a id="openSettings">⚙️ Settings</a>
  </div>
  
  <div class="input-group">
    <label for="baseUrl">Destination URL</label>
    <input type="text" id="baseUrl" placeholder="https://example.com" required>
  </div>

  <div class="input-group">
    <label for="platform">Platform (utm_medium)</label>
    <select id="platform">
      <option value="linkedin">LinkedIn</option>
      <option value="twitter">Twitter</option>
      <option value="facebook">Facebook</option>
      <option value="instagram">Instagram</option>
    </select>
  </div>

  <div class="input-group">
    <label for="campaignSelect">Campaign Name</label>
    <select id="campaignSelect">
      <option value="">-- Loading Campaigns... --</option>
    </select>
    <input type="text" id="campaignCustom" placeholder="Type custom UTM..." style="display: none; margin-top: 8px;">
  </div>

  <div class="input-group">
    <label for="format">File Format</label>
    <select id="format">
      <option value="image">Image</option>
      <option value="video">Video</option>
      <option value="carousel">Carousel</option>
      <option value="tweet">Tweet</option>
      <option value="thread">Thread</option>
      <option value="text">Text</option>
      <option value="reshare">Reshare</option>
    </select>
  </div>

  <div class="input-group">
    <label for="dateStr">Date (ddmmmm)</label>
    <input type="text" id="dateStr" required>
  </div>

  <button id="generateBtn">Generate & Copy URL</button>

  <div id="resultContainer" style="display: none;">
    <textarea id="finalUrl" readonly></textarea>
    <span id="copyStatus">Copied to clipboard!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
